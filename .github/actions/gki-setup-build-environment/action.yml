name: "Setup Build Environment"
description: "Install build helpers and clone GKI packaging dependencies"

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y aria2 ccache jq pigz zip

        mkdir -p "${{ github.workspace }}/.gki"
        mkdir -p "${{ github.workspace }}/.gki/kernel"
        mkdir -p "${{ github.workspace }}/.gki/git-repo"
        curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "${{ github.workspace }}/.gki/git-repo/repo"
        chmod +x "${{ github.workspace }}/.gki/git-repo/repo"
        echo "${{ github.workspace }}/.gki/git-repo" >> "$GITHUB_PATH"

        if [ -d "${{ github.workspace }}/.gki/kernel_patches" ]; then rm -rf "${{ github.workspace }}/.gki/kernel_patches"; fi
        git clone https://github.com/WildKernels/kernel_patches.git "${{ github.workspace }}/.gki/kernel_patches"

        if [ -d "${{ github.workspace }}/.gki/AnyKernel3" ]; then rm -rf "${{ github.workspace }}/.gki/AnyKernel3"; fi
        git clone https://github.com/WildKernels/AnyKernel3.git -b gki-2.0 "${{ github.workspace }}/.gki/AnyKernel3"
