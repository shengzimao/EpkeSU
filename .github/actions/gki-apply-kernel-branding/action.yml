name: "Apply Kernel Branding"
description: "Apply EpkeSU branding to kernel version string"
inputs:
  variant:
    description: "Variant of kernel to apply branding to"
    required: true
  kernel_version:
    description: "Kernel version (e.g., 6.1)"
    required: true
  android_version:
    description: "Android version (e.g., android14)"
    required: true
  version:
    description: "Combined version (e.g., android14-6.1)"
    required: true
  sublevel:
    description: "Sublevel of kernel version (e.g., 1)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Apply Kernel Name Branding
      shell: bash
      working-directory: ${{ github.workspace }}/.gki/kernel/common
      run: |
        VERSION="${{ inputs.version }}"
        ANDROID_PART=$(echo "$VERSION" | cut -d- -f1)
        KERNEL_PART=$(echo "$VERSION" | cut -d- -f2)

        if [[ ${{ inputs.version }} == "android15-6.6" || ${{ inputs.version }} == "android16-6.12" ]]; then
          KERNEL_STRING="$KERNEL_PART.${{ inputs.sublevel }}-$ANDROID_PART"
          sed -i '$d' scripts/setlocalversion && echo "echo \"$KERNEL_STRING-EpkeSU\"" >> scripts/setlocalversion
        else
          sed -i '$d' scripts/setlocalversion && echo "echo \"-$ANDROID_PART-EpkeSU\"" >> scripts/setlocalversion
        fi
        chmod +x scripts/setlocalversion
