name: "Clean Kernel Flags"
description: "Clean dirty flags"

runs:
  using: "composite"
  steps:
    - name: Clean Dirty Flags and ABI Exports
      shell: bash
      working-directory: ${{ github.workspace }}/.gki/kernel
      run: |
        # Clean dirty flags and ABI exports based on build system
        if [ -f "build/build.sh" ]; then
          # Old build system (5.10, 5.15, early 6.1)
          sed -i 's/-dirty//' common/scripts/setlocalversion
        else
          # Bazel build system (newer kernels)
          sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" build/kernel/kleaf/impl/stamp.bzl
          sed -i 's/-dirty//' common/scripts/setlocalversion
        fi

        # Commit changes to avoid dirty state during build when common is a git checkout.
        cd ${{ github.workspace }}/.gki/kernel/common
        if [ ! -d .git ]; then
          echo "common is not a git checkout; skipping dirty-flag commit."
          exit 0
        fi

        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git diff --cached --quiet || git commit -m "gki: Clean dirty flag"
