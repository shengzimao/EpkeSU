name: Build GKI

permissions:
  contents: read
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernel_build_version:
        description: "Kernel version"
        type: choice
        options:
          - All
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
        default: android14-6.1
      feature_set:
        description: "Feature set"
        type: choice
        options:
          - EpkeSU
          - EpkeSU+SUSFS
        default: EpkeSU
      os_patch_level:
        description: "Patch level: latest, all, or YYYY-MM"
        type: string
        default: latest
      use_repo:
        description: "Use repo sync instead of archive downloader"
        type: boolean
        default: true
      use_latest_susfs:
        description: "Use SUSFS branch tip instead of pinned commit"
        type: boolean
        default: true
      build_bypass:
        description: "Also build Bypass-Image"
        type: boolean
        default: false

jobs:
  build-android12-5-10:
    if: ${{ inputs.kernel_build_version == 'All' || inputs.kernel_build_version == 'android12-5.10' }}
    uses: ./.github/workflows/gki-prepare.yml
    with:
      config_file: .github/config/gki-android12-5.10.json
      feature_set: ${{ inputs.feature_set }}
      os_patch_level: ${{ inputs.os_patch_level }}
      use_repo: ${{ inputs.use_repo }}
      use_latest_susfs: ${{ inputs.use_latest_susfs }}
      build_bypass: ${{ inputs.build_bypass }}
    secrets: inherit

  build-android13-5-10:
    if: ${{ inputs.kernel_build_version == 'All' || inputs.kernel_build_version == 'android13-5.10' }}
    uses: ./.github/workflows/gki-prepare.yml
    with:
      config_file: .github/config/gki-android13-5.10.json
      feature_set: ${{ inputs.feature_set }}
      os_patch_level: ${{ inputs.os_patch_level }}
      use_repo: ${{ inputs.use_repo }}
      use_latest_susfs: ${{ inputs.use_latest_susfs }}
      build_bypass: ${{ inputs.build_bypass }}
    secrets: inherit

  build-android13-5-15:
    if: ${{ inputs.kernel_build_version == 'All' || inputs.kernel_build_version == 'android13-5.15' }}
    uses: ./.github/workflows/gki-prepare.yml
    with:
      config_file: .github/config/gki-android13-5.15.json
      feature_set: ${{ inputs.feature_set }}
      os_patch_level: ${{ inputs.os_patch_level }}
      use_repo: ${{ inputs.use_repo }}
      use_latest_susfs: ${{ inputs.use_latest_susfs }}
      build_bypass: ${{ inputs.build_bypass }}
    secrets: inherit

  build-android14-5-15:
    if: ${{ inputs.kernel_build_version == 'All' || inputs.kernel_build_version == 'android14-5.15' }}
    uses: ./.github/workflows/gki-prepare.yml
    with:
      config_file: .github/config/gki-android14-5.15.json
      feature_set: ${{ inputs.feature_set }}
      os_patch_level: ${{ inputs.os_patch_level }}
      use_repo: ${{ inputs.use_repo }}
      use_latest_susfs: ${{ inputs.use_latest_susfs }}
      build_bypass: ${{ inputs.build_bypass }}
    secrets: inherit

  build-android14-6-1:
    if: ${{ inputs.kernel_build_version == 'All' || inputs.kernel_build_version == 'android14-6.1' }}
    uses: ./.github/workflows/gki-prepare.yml
    with:
      config_file: .github/config/gki-android14-6.1.json
      feature_set: ${{ inputs.feature_set }}
      os_patch_level: ${{ inputs.os_patch_level }}
      use_repo: ${{ inputs.use_repo }}
      use_latest_susfs: ${{ inputs.use_latest_susfs }}
      build_bypass: ${{ inputs.build_bypass }}
    secrets: inherit

  build-android15-6-6:
    if: ${{ inputs.kernel_build_version == 'All' || inputs.kernel_build_version == 'android15-6.6' }}
    uses: ./.github/workflows/gki-prepare.yml
    with:
      config_file: .github/config/gki-android15-6.6.json
      feature_set: ${{ inputs.feature_set }}
      os_patch_level: ${{ inputs.os_patch_level }}
      use_repo: ${{ inputs.use_repo }}
      use_latest_susfs: ${{ inputs.use_latest_susfs }}
      build_bypass: ${{ inputs.build_bypass }}
    secrets: inherit

  build-android16-6-12:
    if: ${{ inputs.kernel_build_version == 'All' || inputs.kernel_build_version == 'android16-6.12' }}
    uses: ./.github/workflows/gki-prepare.yml
    with:
      config_file: .github/config/gki-android16-6.12.json
      feature_set: ${{ inputs.feature_set }}
      os_patch_level: ${{ inputs.os_patch_level }}
      use_repo: ${{ inputs.use_repo }}
      use_latest_susfs: ${{ inputs.use_latest_susfs }}
      build_bypass: ${{ inputs.build_bypass }}
    secrets: inherit
