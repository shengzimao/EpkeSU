name: Build OnePlus/Realme GKI

permissions:
  contents: read
  actions: write

on:
  workflow_dispatch:
    inputs:
      target_chip:
        description: "OnePlus/Realme target chip"
        type: choice
        options:
          - All
          - sm8650
          - sm8750
          - sm8850
          - mt6989-mt6897
          - mt6991
          - mt6993
        default: sm8750
      feature_set:
        description: "Feature set"
        type: choice
        options:
          - EpkeSU
          - EpkeSU+SUSFS
        default: EpkeSU+SUSFS
      os_patch_level:
        description: "Patch level: latest, all, or YYYY-MM"
        type: string
        default: latest
      use_repo:
        description: "Use repo sync instead of archive downloader"
        type: boolean
        default: true
      use_latest_susfs:
        description: "Use SUSFS branch tip instead of pinned commit"
        type: boolean
        default: true
      build_bypass:
        description: "Also build Bypass-Image"
        type: boolean
        default: false

jobs:
  build-sm8650:
    name: SM8650 android14-6.1.118
    if: ${{ inputs.target_chip == 'All' || inputs.target_chip == 'sm8650' }}
    uses: ./.github/workflows/gki-prepare.yml
    with:
      config_file: .github/config/gki-oneplus-realme-sm8650.json
      feature_set: ${{ inputs.feature_set }}
      os_patch_level: ${{ inputs.os_patch_level }}
      use_repo: ${{ inputs.use_repo }}
      use_latest_susfs: ${{ inputs.use_latest_susfs }}
      build_bypass: ${{ inputs.build_bypass }}
    secrets: inherit

  build-sm8750:
    name: SM8750 android15-6.6.89
    if: ${{ inputs.target_chip == 'All' || inputs.target_chip == 'sm8750' }}
    uses: ./.github/workflows/gki-prepare.yml
    with:
      config_file: .github/config/gki-oneplus-realme-sm8750.json
      feature_set: ${{ inputs.feature_set }}
      os_patch_level: ${{ inputs.os_patch_level }}
      use_repo: ${{ inputs.use_repo }}
      use_latest_susfs: ${{ inputs.use_latest_susfs }}
      build_bypass: ${{ inputs.build_bypass }}
    secrets: inherit

  build-sm8850:
    name: SM8850 android16-6.12.23
    if: ${{ inputs.target_chip == 'All' || inputs.target_chip == 'sm8850' }}
    uses: ./.github/workflows/gki-prepare.yml
    with:
      config_file: .github/config/gki-oneplus-realme-sm8850.json
      feature_set: ${{ inputs.feature_set }}
      os_patch_level: ${{ inputs.os_patch_level }}
      use_repo: ${{ inputs.use_repo }}
      use_latest_susfs: ${{ inputs.use_latest_susfs }}
      build_bypass: ${{ inputs.build_bypass }}
    secrets: inherit

  build-mt6989-mt6897:
    name: MT6989/MT6897 android14-6.1.118
    if: ${{ inputs.target_chip == 'All' || inputs.target_chip == 'mt6989-mt6897' }}
    uses: ./.github/workflows/gki-prepare.yml
    with:
      config_file: .github/config/gki-oneplus-realme-mt6989-mt6897.json
      feature_set: ${{ inputs.feature_set }}
      os_patch_level: ${{ inputs.os_patch_level }}
      use_repo: ${{ inputs.use_repo }}
      use_latest_susfs: ${{ inputs.use_latest_susfs }}
      build_bypass: ${{ inputs.build_bypass }}
    secrets: inherit

  build-mt6991:
    name: MT6991 android15-6.6.89
    if: ${{ inputs.target_chip == 'All' || inputs.target_chip == 'mt6991' }}
    uses: ./.github/workflows/gki-prepare.yml
    with:
      config_file: .github/config/gki-oneplus-realme-mt6991.json
      feature_set: ${{ inputs.feature_set }}
      os_patch_level: ${{ inputs.os_patch_level }}
      use_repo: ${{ inputs.use_repo }}
      use_latest_susfs: ${{ inputs.use_latest_susfs }}
      build_bypass: ${{ inputs.build_bypass }}
    secrets: inherit

  build-mt6993:
    name: MT6993 android16-6.12.23
    if: ${{ inputs.target_chip == 'All' || inputs.target_chip == 'mt6993' }}
    uses: ./.github/workflows/gki-prepare.yml
    with:
      config_file: .github/config/gki-oneplus-realme-mt6993.json
      feature_set: ${{ inputs.feature_set }}
      os_patch_level: ${{ inputs.os_patch_level }}
      use_repo: ${{ inputs.use_repo }}
      use_latest_susfs: ${{ inputs.use_latest_susfs }}
      build_bypass: ${{ inputs.build_bypass }}
    secrets: inherit
